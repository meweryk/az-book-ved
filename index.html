<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Каталог Знаків</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#f5f0e6">
</head>
<body>
  <!-- Фіксований навігаційний бар зверху -->

    <div class="navbar-inner">
      <div class="navbar-left">
        <a href="./sokol.png" class="navbar-logo-link">
          <img src="./sokol.png" alt="sokol" class="navbar-logo">
        </a>
        <span class="navbar-title">Книга знаків</span>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Меню">
        <i class="bi bi-list"></i>
      </button>
    </div>
    <div class="nav-container" id="navContainer">
      <button class="nav-btn" data-page="home">Головна</button>
      <button class="nav-btn" data-page="analyze">Розбір слова</button>
      <button class="nav-btn" data-page="search">Пошук за символом</button>
      <button class="nav-btn" data-page="kolyada">Круголѣтъ Числобога</button>
      <span class="nav-divider">Інші роботи</span>
      <a href="https://meweryk.github.io/Wave-of-land/index.html" class="nav-link-external" target="_blank">Частоти планет</a>
      <a href="https://meweryk.github.io/word-torsion/" class="nav-link-external" target="_blank">Торсійний контраст тексту</a>
      <a href="https://meweryk.github.io/Wave-of-land/spectr.html" class="nav-link-external" target="_blank">Частоти тризвуків</a>
      <a href="https://meweryk.github.io/midi/index.html" class="nav-link-external" target="_blank">Двоканальний генератор частот</a>
      <a href="https://meweryk.github.io/atlas_Ledneva/" class="nav-link-external" target="_blank">Атлас акупунктури</a>
    </div>
  </nav>
  
  <!-- Оверлей для мобільного меню -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Основний контент -->
  <main class="main-content">
    <!-- Сторінка Головна (каталог) -->
    <div id="homePage" class="page-container active-page">
      <!-- Кнопка для енергій на всю ширину -->
      <div class="energy-category-wrapper mb-2">
        <button class="energy-category-btn btn-sm" onclick="selectCategory('energies', this)">Енергії</button>
      </div>
      <div class="category-panel mb-3">
        <button class="category-btn btn-sm" onclick="selectCategory('letters', this)">Літери</button>
        <button class="category-btn btn-sm" onclick="selectCategory('izvody', this)">Ізводи</button>
        <button class="category-btn btn-sm" onclick="selectCategory('sanskrit', this)">Санскріт</button>
        <button class="category-btn btn-sm" onclick="selectCategory('numbers', this)">Числа</button>
        <button class="category-btn btn-sm" onclick="selectCategory('runes', this)">Руни</button>
      </div>
      <div id="symbolList"></div>
      <div id="mainSection"></div>
      <div id="output" style="display:none;"></div>
      <div class="mt-3">
        <button class="btn btn-success btn-sm me-2" onclick="exportCSV()">Експорт у CSV</button>
        <button id="importCsvBtn" class="btn btn-secondary btn-sm">Імпорт CSV</button>
        <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
      </div>
    </div>

    <!-- Сторінка Розбір слова -->
    <div id="analyzePage" class="page-container">
      <div class="section">
        <div class="d-flex align-items-center mb-2">
          <h4 class="mb-0">Розбір слова</h4>
          <button id="symbolsToggle" class="btn btn-outline-primary symbols-toggle-btn btn-sm ms-2" onclick="toggleSymbolKeyboard()">Клавіатура</button>
        </div>
        <div id="symbolKeyboard" class="symbol-keyboard"></div>
        <div class="input-group mb-2">
          <input id="wordInput" type="text" placeholder="Введіть слово" class="form-control" />
          <button class="btn btn-primary btn-sm" onclick="analyzeWord()">Відати</button>
        </div>
        <ul class="nav nav-tabs analysis-tabs mb-3" id="analysisTabs">
          <li class="nav-item">
            <a class="nav-link active" onclick="switchAnalysis('letters')">За літерами</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="switchAnalysis('numbers')">За числами</a>
          </li>
        </ul>
        <div id="wordAnalysis"></div>
      </div>
    </div>

    <!-- Сторінка Пошук за символом -->
    <div id="searchPage" class="page-container">
      <div class="section">
        <h4>Пошук за символом</h4>
        <div class="input-group">
          <input id="searchInput" type="text" class="form-control" placeholder="Введіть символ або властивість">
          <button class="btn btn-primary btn-sm" onclick="searchSymbol()">Знайти</button>
          <button class="btn btn-secondary btn-sm" onclick="clearSearch()">Очистити</button>
        </div>
        <div id="searchResults" class="mt-3"></div>
      </div>
    </div>
    
    <!-- Сторінка Круголѣтъ Числобога -->
    <!-- Сюди буде завантажуватись вміст kolyadaDar.html -->
    <div id="kolyadaPage" class="page-container"></div>
  </main>

  <!-- Фіксований футер -->
  <footer class="fixed-footer">
  <div class="copyright">
    <a href="./footer.png" class="footer-image-link">
      <img src="./footer.png" alt="mainSectionweryk" class="footer-image">
    </a>
  </div>
</footer>

  <div id="noResultsAlert" class="no-results-alert">У базі немає відповідностей</div>
  <div id="toastMessage" class="toast-message"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./script.js"></script>
<script>
  // Service Worker реєстрація (динамічний шлях, автооновлення)
  if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const basePath = window.location.pathname.replace(/\/[^/]*$/, '');
    
    navigator.serviceWorker.register(`${basePath}/service-worker.js`, {
      scope: `${basePath}/`
    }).then(reg => {
      console.log('SW registered:', reg);
      
      setInterval(() => reg.update(), 5 * 60 * 1000);
      
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            if (confirm('Доступна нова версія додатку. Оновити?')) {
              window.location.reload();
            }
          }
        });
      });
    }).catch(err => console.log('SW registration failed:', err));
  });
}// Мобільне меню (код залишається без змін)
  const menuToggle = document.getElementById('menuToggle');
  const navContainer = document.getElementById('navContainer');
  const navOverlay = document.getElementById('navOverlay');
  
  function closeMenu() {
    navContainer.classList.remove('open');
    navOverlay.classList.remove('open');
  }
  
  function openMenu() {
    navContainer.classList.add('open');
    navOverlay.classList.add('open');
  }
  
  if (menuToggle) {
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (navContainer.classList.contains('open')) {
        closeMenu();
      } else {
        openMenu();
      }
    });
  }
  
  if (navOverlay) {
    navOverlay.addEventListener('click', closeMenu);
  }
  
  document.querySelectorAll('.nav-btn, .nav-link-external').forEach(btn => {
    btn.addEventListener('click', () => {
      setTimeout(closeMenu, 150);
    });
  });
  
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      // Якщо потрібно закривати меню при зміні розміру, можна залишити
      // closeMenu();
    }
  });
</script>
</body>
</html>
